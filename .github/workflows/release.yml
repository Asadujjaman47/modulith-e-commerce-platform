# Release — builds, tests and publishes the application Docker image to GitHub Container Registry.
#
# Triggers on every merge to main (tags: latest + sha-<short>) and on v* release tags
# (tags: the semver, plus major.minor). Deployment is intentionally NOT chained here: run the
# gated deploy.yml manually once an image is published.
name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

# Serialize per-ref but never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Re-run the full gate before publishing (also covers tag pushes that never saw a PR).
  build-test:
    uses: ./.github/workflows/build.yml

  publish:
    name: Build & push image (GHCR)
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derives image tags/labels. metadata-action lowercases the image name, so the mixed-case
      # owner is handled automatically.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ecommerce
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan published image (Trivy)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/ecommerce@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library
          exit-code: "0"

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release
