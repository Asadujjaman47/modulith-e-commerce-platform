# Release — builds, tests and publishes the application Docker image to GitHub Container Registry.
#
# Triggers on every merge to main (tags: latest + sha-<short>) and on v* release tags
# (tags: the semver, plus major.minor). Deployment is intentionally NOT chained here: run the
# gated deploy.yml manually once an image is published.
name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

# Serialize per-ref but never cancel an in-flight publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Re-run the full gate before publishing (also covers tag pushes that never saw a PR).
  build-test:
    uses: ./.github/workflows/build.yml

  publish:
    name: Build & push image (GHCR)
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase; the owner is mixed-case. Compute it once and reuse.
      - name: Compute image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/ecommerce" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the pushed image from its official container (deterministic; avoids the trivy-action
      # binary download). Trivy pulls the image from GHCR using the same credentials.
      - name: Scan published image (Trivy)
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -e TRIVY_USERNAME -e TRIVY_PASSWORD \
            -v "$PWD:/work" -w /work \
            aquasec/trivy:0.65.0 image \
              --format sarif --output trivy-results.sarif \
              --severity CRITICAL,HIGH --pkg-types os,library \
              --exit-code 0 --no-progress \
              ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-release
