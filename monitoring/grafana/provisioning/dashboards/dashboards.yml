apiVersion: 1

# Loads every dashboard JSON mounted under /var/lib/grafana/dashboards on startup.
providers:
  - name: ecommerce-dashboards
    orgId: 1
    folder: E-Commerce
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
