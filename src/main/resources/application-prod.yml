# Production profile. Activated with SPRING_PROFILES_ACTIVE=prod (combine with the `docker`
# profile when running in a container, e.g. SPRING_PROFILES_ACTIVE=docker,prod).
#
# Hardening over the defaults:
#   - the JWT signing secret has NO fallback: JWT_SECRET must be supplied or the app fails to start
#   - Swagger UI / OpenAPI docs are disabled
#   - SQL is never logged and health details are hidden from anonymous callers
spring:
  jpa:
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    # Fail fast: no dev fallback. A missing/short JWT_SECRET aborts startup (HMAC key < 256 bits).
    secret: ${JWT_SECRET}
  cors:
    # No default in production — the real front-end origin(s) must be provided explicitly.
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

management:
  endpoint:
    health:
      # Never leak component health detail to anonymous probes in production.
      show-details: never

logging:
  level:
    root: WARN
    com.company.ecommerce: INFO
