# Active when the application itself runs inside a container (docker compose).
# Overrides the localhost defaults so the app reaches the postgres/redis service hostnames.
# Credentials still come from DB_* env vars (mapped from POSTGRES_* by docker compose).
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:mailpit}
    port: ${MAIL_PORT:1025}

# Inside the container, ship spans to the zipkin compose service.
management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

# Emit structured JSON logs (ECS layout) to stdout for log aggregation; traceId/spanId from the
# MDC are included automatically, satisfying the deployment logging contract.
logging:
  structured:
    format:
      console: ${LOG_FORMAT:ecs}