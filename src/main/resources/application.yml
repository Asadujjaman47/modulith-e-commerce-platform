spring:
  application:
    name: ecommerce

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:ecommerce}
    password: ${DB_PASSWORD:ecommerce}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool sizing/timeouts. Size for the deployment; the default (10) suits a single
      # app instance against a modest Postgres. Fail fast rather than queue forever on exhaustion.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          # Batch writes (append-only ledgers, cascade saves) into multi-row statements.
          batch_size: 50
        order_inserts: true
        order_updates: true
        # Batch LAZY association loads into IN (...) queries, turning N+1 collection/entity
        # fetches (product images, order items, payment transactions) into a handful of queries.
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Fail fast rather than hang when Redis is slow/unreachable; the CacheErrorHandler then
      # downgrades the miss to a database read (Redis is a cache, not the source of truth).
      timeout: ${REDIS_TIMEOUT:2s}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      lettuce:
        pool:
          enabled: true
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: ${REDIS_POOL_MAX_WAIT:2s}
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    # Mailpit (dev/docker) accepts unauthenticated SMTP; real SMTP credentials come from env.
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  jwt:
    # HMAC-SHA256 signing secret (base64-encoded, >= 256 bits / 32 bytes).
    # The fallback below is a PUBLIC dev-only placeholder for local runs (IntelliJ / spring-boot:run)
    # and MUST NOT be used anywhere else. The Docker/deploy path requires JWT_SECRET to be set
    # explicitly (docker-compose has no fallback and fails fast if it is missing).
    secret: ${JWT_SECRET:ZGV2LXNlY3JldC1jaGFuZ2UtbWUtYXQtbGVhc3QtMzItYnl0ZXMtbG9uZyE=}
    issuer: ecommerce
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}

  notification:
    # Sender address used for outbound emails (notification module).
    from-address: ${NOTIFICATION_FROM:no-reply@ecommerce.local}

  cors:
    # Comma-separated front-end origins permitted to call /api/**. Override per environment;
    # exact origins only (no wildcard) because credentialed requests are allowed.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

  rate-limit:
    # Token-bucket limits over Redis (shared across instances; in-memory fallback if Redis is down).
    enabled: ${RATE_LIMIT_ENABLED:true}
    auth:
      # Strict per-IP limit on login/register/refresh to blunt credential stuffing.
      capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
      refill-period: ${RATE_LIMIT_AUTH_PERIOD:PT1M}
    api:
      # Looser per-principal (or per-IP) limit on the rest of the API.
      capacity: ${RATE_LIMIT_API_CAPACITY:100}
      refill-period: ${RATE_LIMIT_API_PERIOD:PT1M}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        # metrics is the JSON browse endpoint; prometheus is the scrape endpoint.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        # Exposes /actuator/health/liveness and /actuator/health/readiness (k8s-style probes).
        enabled: true
      group:
        readiness:
          # The app is only ready to serve traffic once Postgres and Redis are reachable.
          include: readinessState,db,redis
  health:
    redis:
      enabled: true
    db:
      enabled: true
    # Mail delivery is best-effort (notification failures are swallowed by design), so an
    # unreachable SMTP server must not drag the application's health to DOWN.
    mail:
      enabled: false
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    distribution:
      # Publish histogram buckets (enables Prometheus heatmaps + accurate quantiles in Grafana)
      # and client-side percentiles for HTTP server request latency.
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 400ms, 1s
  tracing:
    sampling:
      # Sample every request in non-prod so traces are always available; tune down per-environment.
      probability: ${TRACING_SAMPLE_RATE:1.0}
  zipkin:
    tracing:
      # Where Brave ships spans. Unset/unreachable -> spans are simply dropped (no startup failure).
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

info:
  app:
    name: ${spring.application.name}
    description: E-Commerce Platform (Spring Modulith)

logging:
  level:
    com.company.ecommerce: INFO
  pattern:
    # Correlate plain-text console logs with traces (traceId/spanId injected by Micrometer Tracing).
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
  include-application-name: false