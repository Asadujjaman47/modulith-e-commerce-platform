services:
  postgres:
    image: postgres:17-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: ecommerce-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025"     # Web UI
    networks:
      - ecommerce-network

  app:
    # Locally `docker compose up` builds from the Dockerfile (tagged ecommerce:local). On a deploy
    # host, set APP_IMAGE to a published GHCR tag so `docker compose pull` fetches it instead.
    image: ${APP_IMAGE:-ecommerce:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      # App datasource (DB_* scheme). Host/port default to the docker profile (postgres/5432);
      # credentials are derived from the single POSTGRES_* source of truth.
      DB_NAME: ${POSTGRES_DB:-ecommerce}
      DB_USERNAME: ${POSTGRES_USER:-ecommerce}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      # JWT signing secret. Required — no fallback, so the stack fails fast if it is unset
      # (copy .env.example to .env and set a real value) rather than booting with a known key.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set — run "cp .env.example .env" and set a value}
      # Observability: export traces to the zipkin service and sample everything in dev.
      ZIPKIN_ENDPOINT: ${ZIPKIN_ENDPOINT:-http://zipkin:9411/api/v2/spans}
      TRACING_SAMPLE_RATE: ${TRACING_SAMPLE_RATE:-1.0}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - ecommerce-network

  zipkin:
    image: openzipkin/zipkin:3
    container_name: ecommerce-zipkin
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    networks:
      - ecommerce-network

  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - app
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      # Auto-provision the Prometheus datasource and the bundled dashboards on startup.
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data:
  grafana-data: